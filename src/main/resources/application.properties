spring.application.name=leavemanagement
server.port=8081
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.jsp
spring.main.allow-circular-references=true
server.error.whitelabel.enabled=false

#spring.datasource.url=jdbc:mysql://localhost:3306/leavemanagement
#spring.datasource.username=root
#spring.datasource.password=
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/leavemanagement}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20480KB


